name: Deploy to Prod

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write    # Required for OIDC login
  contents: read

jobs:
  deploy-prod:
    name: Deploy Production Environment
    runs-on: ubuntu-latest
    # Enforces manual approval gate configured inside the GitHub Environment
    environment: production
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Tag Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.12.0"

      # Authenticate to Azure using OIDC Federated Credentials (Zero Static Secrets)
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 1. Provision / Sync Production Infrastructure via Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Select Workspace
        run: terraform workspace select prod || terraform workspace new prod
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform

      # 2. Extract Production Terraform Outputs dynamically
      - name: Extract Terraform Outputs
        id: tf_outputs
        run: |
          cd terraform
          terraform workspace select prod
          echo "ACR_SERVER=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "KV_NAME=$(terraform output -raw key_vault_name)" >> $GITHUB_OUTPUT
          echo "QUEUE_URL=$(terraform output -raw queue_account_url)" >> $GITHUB_OUTPUT
          echo "API_CLIENT_ID=$(terraform output -raw api_managed_identity_client_id)" >> $GITHUB_OUTPUT
          echo "WORKER_CLIENT_ID=$(terraform output -raw worker_managed_identity_client_id)" >> $GITHUB_OUTPUT
          echo "AKS_CLUSTER=$(terraform output -raw aks_cluster_name)" >> $GITHUB_OUTPUT
          echo "RESOURCE_GROUP=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

      # 3. Log into ACR & Build and Push Production Release-Tagged Container Image
      - name: Log in to ACR
        run: |
          az acr login --name ${{ steps.tf_outputs.outputs.ACR_SERVER }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.tf_outputs.outputs.ACR_SERVER }}/notifications:${{ steps.get_version.outputs.VERSION }} -t ${{ steps.tf_outputs.outputs.ACR_SERVER }}/notifications:latest ./starter_app
          docker push ${{ steps.tf_outputs.outputs.ACR_SERVER }}/notifications:${{ steps.get_version.outputs.VERSION }}
          docker push ${{ steps.tf_outputs.outputs.ACR_SERVER }}/notifications:latest

      # 4. Connect to Production AKS and Deploy Helm Chart
      - name: Get AKS Kubeconfig
        run: |
          az aks get-credentials --resource-group ${{ steps.tf_outputs.outputs.RESOURCE_GROUP }} --name ${{ steps.tf_outputs.outputs.AKS_CLUSTER }} --overwrite-existing

      # Automatically install KEDA on AKS (Unlocks the Event-Driven queue-depth scaling stretch goal)
      - name: Install KEDA
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm upgrade --install keda kedacore/keda --namespace keda --create-namespace
          echo "Waiting 15 seconds for KEDA API service to initialize..."
          sleep 15

      - name: Helm Upgrade Rollout
        run: |
          helm upgrade --install notification-engine charts/notification-engine \
            -f charts/notification-engine/values-prod.yaml \
            --set image.repository=${{ steps.tf_outputs.outputs.ACR_SERVER }}/notifications \
            --set image.tag=${{ steps.get_version.outputs.VERSION }} \
            --set keyvault.name=${{ steps.tf_outputs.outputs.KV_NAME }} \
            --set keyvault.tenantId=${{ secrets.AZURE_TENANT_ID }} \
            --set queue.accountUrl=${{ steps.tf_outputs.outputs.QUEUE_URL }} \
            --set api.managedIdentityClientId=${{ steps.tf_outputs.outputs.API_CLIENT_ID }} \
            --set worker.managedIdentityClientId=${{ steps.tf_outputs.outputs.WORKER_CLIENT_ID }}
