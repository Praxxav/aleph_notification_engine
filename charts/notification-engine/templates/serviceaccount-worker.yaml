    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: worker
  annotations:
    azure.workload.identity/client-id: {{ .Values.worker.managedIdentityClientId | quote }}
