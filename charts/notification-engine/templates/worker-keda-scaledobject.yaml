{{- if .Values.worker.autoscaling.enabled }}
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-trigger-auth-azure-queue
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podIdentity:
    provider: azure-workload
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: notification-worker-scaledobject
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-worker
  minReplicaCount: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.worker.autoscaling.maxReplicas }}
  pollingInterval: 15
  cooldownPeriod: 60
  triggers:
    - type: azure-queue
      authenticationRef:
        name: keda-trigger-auth-azure-queue
      metadata:
        queueName: {{ .Values.queue.name | quote }}
        queueLength: {{ .Values.worker.autoscaling.queueLength | quote }}
        # Exposing the storage account name derived from queue.accountUrl
        # e.g., if accountUrl is "https://stalephdevxxxx.queue.core.windows.net/", KEDA parses the account name
{{- end }}
